version: "2"
sql:
  - engine: "postgresql"
    queries: "../db/query"
    schema: "../db/migrations"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        overrides:
          - db_type: "text"
            nullable: true
